<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>agrologic | Innovation in Agriculture</title>
  <meta name="description" content="Agrologic | Innovation in Agriculture. Enter Greenhub by Agrologic." />

  <style>
    :root {
      --green: #31543a;
      --green-dark: #0f1d12;
      --white: #ffffff;
      --soft-white: rgba(255,255,255,.88);
      --glass: rgba(10, 20, 12, .42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      color: var(--white);
    }

    body {
      background:
        linear-gradient(rgba(0, 0, 0, .22), rgba(0, 0, 0, .28)),
        url("photo.jpg") center center / cover no-repeat fixed;
      overflow: hidden;
    }

    .site-brand {
      position: fixed;
      top: 34px;
      left: 38px;
      z-index: 5;
    }

    .site-brand h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -1.6px;
      text-transform: lowercase;
      text-shadow: 0 3px 16px rgba(0,0,0,.35);
    }

    .site-brand p {
      margin: 8px 0 0;
      font-size: clamp(13px, 2vw, 17px);
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--soft-white);
      text-shadow: 0 3px 16px rgba(0,0,0,.35);
    }

    .entry {
      position: fixed;
      left: 50%;
      bottom: 10vh;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
    }

    .greenhub-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(520px, calc(100vw - 40px));
      min-height: 72px;
      padding: 18px 36px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.42);
      background: rgba(20, 52, 30, .78);
      backdrop-filter: blur(14px);
      color: white;
      text-decoration: none;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 600;
      letter-spacing: -1px;
      box-shadow: 0 18px 52px rgba(0,0,0,.34);
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .greenhub-button:hover {
      transform: translateY(-3px);
      background: rgba(32, 78, 43, .88);
      box-shadow: 0 24px 70px rgba(0,0,0,.42);
    }

    .chat-widget {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 10;
    }

    .chat-button {
      width: 62px;
      height: 62px;
      border: 0;
      border-radius: 50%;
      background: rgba(20, 52, 30, .86);
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 16px 42px rgba(0,0,0,.32);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.25);
    }

    .chat-panel {
      position: absolute;
      right: 0;
      bottom: 78px;
      width: min(340px, calc(100vw - 40px));
      padding: 20px;
      border-radius: 24px;
      background: rgba(15, 29, 18, .88);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.16);
      display: none;
    }

    .chat-panel.open {
      display: block;
    }

    .chat-panel h2 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -.6px;
    }

    .chat-panel p {
      margin: 0 0 16px;
      color: rgba(255,255,255,.74);
      line-height: 1.45;
      font-size: 14px;
    }

    .chat-panel form {
      display: grid;
      gap: 10px;
    }

    .chat-panel input,
    .chat-panel textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      background: rgba(255,255,255,.10);
      color: white;
      padding: 12px 13px;
      font-family: inherit;
      outline: none;
    }

    .chat-panel textarea {
      min-height: 94px;
      resize: vertical;
    }

    .chat-panel input::placeholder,
    .chat-panel textarea::placeholder {
      color: rgba(255,255,255,.52);
    }

    .chat-panel button[type="submit"] {
      border: 0;
      border-radius: 999px;
      min-height: 44px;
      background: white;
      color: var(--green-dark);
      font-weight: 600;
      cursor: pointer;
    }

    .chat-note {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,.56);
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .site-brand {
        top: 24px;
        left: 24px;
        right: 24px;
      }

      .entry {
        bottom: 116px;
      }

      .chat-widget {
        right: 20px;
        bottom: 20px;
      }
    }
  </style>
</head>

<body>
  <header class="site-brand">
    <h1>agrologic</h1>
    <p>Innovation in Agriculture</p>
  </header>

  <main class="entry">
    <a class="greenhub-button" href="./greenhub/">greenhub by agrologic</a>
  </main>

  <div class="chat-widget">
    <div class="chat-panel" id="chatPanel">
      <h2>Chat with us</h2>
      <p>Send a message to Agrologic. Live chat and email routing will be connected in a later stage.</p>

      <form id="chatForm">
        <input type="text" placeholder="Name" required />
        <input type="email" placeholder="Email" required />
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Send message</button>
      </form>

      <div class="chat-note">
        Reminder: connect future form routing to agrologic.cy@gmail.com.
      </div>
    </div>

    <button class="chat-button" id="chatButton" aria-label="Open chat">💬</button>
  </div>

  <script>
    const chatButton = document.getElementById("chatButton");
    const chatPanel = document.getElementById("chatPanel");
    const chatForm = document.getElementById("chatForm");

    chatButton.addEventListener("click", () => {
      chatPanel.classList.toggle("open");
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      alert("Demo only: the contact form is ready visually. Email routing will be connected later.");
      chatForm.reset();
      chatPanel.classList.remove("open");
    });
  </script>
</body>
</html>
